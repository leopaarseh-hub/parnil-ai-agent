<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Parnil">
  <!-- Lime rounded-square brand tile -->
  <rect x="0" y="0" width="100" height="100" rx="22" fill="#C8FF00"/>
  <!-- Black eye mark (matches the Parnil logo), centered with padding -->
  <g transform="translate(50 50) scale(0.86) translate(-50 -48.5)" fill="#050A14">
    <!-- Upper eyelid -->
    <path d="M 10 50 C 30 25, 70 25, 90 50 C 70 32, 30 32, 10 50 Z"/>
    <!-- Lower eyelid -->
    <path d="M 20 60 C 38 72, 62 72, 80 60 C 65 67, 35 67, 20 60 Z"/>
    <!-- Yin-yang pupil -->
    <g transform="translate(50, 48.5)">
      <circle cx="0" cy="0" r="11"/>
      <path d="M 0 -11 A 5.5 5.5 0 0 0 0 0 A 5.5 5.5 0 0 1 0 11 A 11 11 0 0 0 0 -11 Z" fill="#C8FF00"/>
      <circle cx="0" cy="-5.5" r="2.2" fill="#C8FF00"/>
      <circle cx="0" cy="5.5" r="2.2"/>
    </g>
  </g>
</svg>
